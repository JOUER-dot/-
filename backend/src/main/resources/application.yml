spring:
  application:
    name: roboadvisor-backend
  profiles:
    active: dev
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.finance.roboadvisor.auth.entity
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:finance-roboadvisor-demo-secret-key-2026-auth-module}
  expiration: 7200000
  header: Authorization
  token-head: "Bearer "

# ========== DeepSeek AI 小助手 ==========
ai:
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
    api-url: https://api.deepseek.com/v1/chat/completions
    model: deepseek-chat
